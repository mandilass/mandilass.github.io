<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MANDILAS v1.0 | Stark Industries</title>
    <style>
        body { background-color: #0a0a0a; color: #00d4ff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: column; height: 100vh; margin: 0; }
        header { padding: 20px; border-bottom: 2px solid #00d4ff; text-align: center; box-shadow: 0 0 15px #00d4ff; }
        #chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .message { max-width: 80%; padding: 12px; border-radius: 10px; line-height: 1.4; }
        .user { align-self: flex-end; background: #004455; color: white; border-bottom-right-radius: 0; }
        .bot { align-self: flex-start; background: #1a1a1a; border: 1px solid #00d4ff; border-bottom-left-radius: 0; box-shadow: 0 0 10px rgba(0,212,255,0.2); }
        #input-area { padding: 20px; display: flex; gap: 10px; background: #111; }
        input { flex: 1; padding: 12px; border-radius: 5px; border: 1px solid #00d4ff; background: #000; color: #00d4ff; outline: none; }
        button { padding: 10px 20px; background: #00d4ff; color: #000; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        button:hover { background: #0088aa; }
    </style>
</head>
<body>
    <header><h1>MANDILAS <span style="font-size: 0.5em;">v1.0</span></h1></header>
    <div id="chat-container">
        <div class="message bot">Sistemas online. Esperando identificación... ¿Vas a decirme en qué desperdiciaste el dinero hoy o tengo que adivinarlo?</div>
    </div>
    <div id="input-area">
        <input type="text" id="user-input" placeholder="Escribe al Mandilas...">
        <button onclick="sendMessage()">ENVIAR</button>
    </div>

    <script>
        // CONFIGURACIÓN - PEGA TU KEY AQUÍ
        const API_KEY = 'AIzaSyC3MFhu4aO36pu2dUn0UxyZVtMm94XdpYo'; 
        const API_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;

        const chatContainer = document.getElementById('chat-container');

        async function sendMessage() {
            const input = document.getElementById('user-input');
            const text = input.value;
            if (!text) return;

            addMessage(text, 'user');
            input.value = '';

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `Eres MANDILAS v1.0, un asistente de gestión sarcástico y eficiente al estilo de la IA de Tony Stark. Tu misión es fiscalizar los gastos del usuario y sus logros diarios. Sé ácido, ingenioso y breve. Usuario dice: ${text}` }] }]
                    })
                });
                const data = await response.json();
                const botText = data.candidates[0].content.parts[0].text;
                addMessage(botText, 'bot');
            } catch (e) {
                addMessage("Error en los circuitos: " + e.message, 'bot');
            }
        }

        function addMessage(text, sender) {
            const div = document.createElement('div');
            div.className = `message ${sender}`;
            div.innerText = text;
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }
    </script>
</body>
</html>
